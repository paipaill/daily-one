<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一句 · Daily Quote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Space+Mono:wght@400;700&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg:    #070707;
  --gold:  #BFA06A;
  --gold2: #6E5430;
  --text:  #ECE4D6;
  --muted: #5E5650;
  --line:  #1E1E1E;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; background:var(--bg);
  color:var(--text); font-family:'Noto Serif SC',serif;
  overflow:hidden; user-select:none;
}

/* ── HEADER ── */
.hdr {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:50px; display:flex; justify-content:space-between; align-items:center;
  padding:0 40px;
  background:rgba(7,7,7,0.9); backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:opacity 0.6s;
}
.hdr.hide { opacity:0; pointer-events:none; }
.hdr-brand {
  font-family:'Space Mono',monospace;
  font-size:9px; letter-spacing:0.4em; color:var(--muted); text-transform:uppercase;
}
.hdr-date {
  font-family:'Space Mono',monospace;
  font-size:9px; letter-spacing:0.2em; color:var(--gold);
}

/* ── SCENE ── */
.scene {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  padding:60px 24px 72px;
  transition:opacity 0.6s;
}
.scene.hide { opacity:0; pointer-events:none; }

/* ── CARD (1:1) ── */
.card {
  position:relative;
  width: min(calc(100vh - 144px), calc(100vw - 48px), 600px);
  aspect-ratio:1/1;
  overflow:hidden;
  cursor:default;
}

/* bg image */
.card-bg {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  transform:scale(1.03);
  transition:transform 1.8s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.7s ease;
  opacity:0;
}
.card-bg.ready { opacity:1; transform:scale(1); }

/* layered overlays — refined dark vignette */
.card-vignette {
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 50% 100%, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.0) 70%),
    radial-gradient(ellipse at 50% 0%,   rgba(0,0,0,0.5) 0%,  rgba(0,0,0,0.0) 65%),
    linear-gradient(to bottom, rgba(5,5,5,0.32) 0%, rgba(5,5,5,0.0) 35%, rgba(5,5,5,0.0) 55%, rgba(5,5,5,0.82) 100%);
}

/* subtle grain */
.card-grain {
  position:absolute; inset:0; mix-blend-mode:soft-light; opacity:0.35;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='f'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23f)' opacity='0.08'/%3E%3C/svg%3E");
}

/* corner marks */
.co { position:absolute; width:20px; height:20px; border-color:rgba(191,160,106,0.36); border-style:solid; border-width:0; }
.co-tl{top:14px;left:14px;border-top-width:1px;border-left-width:1px}
.co-tr{top:14px;right:14px;border-top-width:1px;border-right-width:1px}
.co-bl{bottom:14px;left:14px;border-bottom-width:1px;border-left-width:1px}
.co-br{bottom:14px;right:14px;border-bottom-width:1px;border-right-width:1px}

/* ghost quotation */
.ghost {
  position:absolute; top:-8%; left:2%;
  font-family:'Playfair Display',serif; font-weight:800;
  font-size:clamp(160px,32vw,280px); line-height:1;
  color:var(--gold); opacity:0.038;
  user-select:none; pointer-events:none;
}

/* ── CARD CONTENT ── */
.cc {
  position:absolute; inset:0; z-index:2;
  display:flex; flex-direction:column; justify-content:space-between;
  padding:clamp(20px,4.5%,40px);
}
.cc.out { animation:fadeSlideOut 0.32s ease forwards; }
.cc.in  { animation:fadeSlideIn  0.46s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes fadeSlideOut { to{opacity:0;transform:translateY(-10px);} }
@keyframes fadeSlideIn  { from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);} }

/* top row */
.top-row { display:flex; justify-content:space-between; align-items:flex-start; }
.tag {
  font-family:'Space Mono',monospace;
  font-size:clamp(7px,1.3vw,8.5px); letter-spacing:0.32em; color:var(--gold);
  text-transform:uppercase; display:flex; align-items:center; gap:9px;
}
.tag::before { content:''; display:block; width:16px; height:1px; background:var(--gold); opacity:0.5; }
.top-date {
  font-family:'Space Mono',monospace;
  font-size:clamp(6.5px,1.2vw,8px); letter-spacing:0.13em;
  color:rgba(255,255,255,0.26); text-align:right; line-height:2;
}

/* quote body */
.body { display:flex; flex-direction:column; gap:clamp(8px,1.8%,15px); }
.q-cn {
  font-family:'Noto Serif SC',serif; font-weight:300;
  font-size:clamp(14px,3vw,21px); line-height:2.08;
  color:var(--text); text-shadow:0 2px 16px rgba(0,0,0,0.9);
  letter-spacing:0.06em;
}
/* ★ English: Playfair Display italic bold */
.q-en {
  font-family:'Playfair Display',serif; font-style:italic; font-weight:700;
  font-size:clamp(11px,2vw,15px); line-height:1.68;
  color:rgba(236,228,214,0.44);
  text-shadow:0 1px 12px rgba(0,0,0,0.95);
  letter-spacing:0.01em;
}

/* attribution */
.attr-bar { height:1px; background:linear-gradient(to right,rgba(191,160,106,0.35),rgba(255,255,255,0.04),transparent); margin-bottom:13px; }
.attr { display:flex; justify-content:space-between; align-items:flex-end; }
.attr-name {
  font-family:'Playfair Display',serif; font-weight:700;
  font-size:clamp(15px,3vw,20px); color:var(--text);
  text-shadow:0 1px 14px rgba(0,0,0,0.95); margin-bottom:3px;
  letter-spacing:0.02em;
}
.attr-sub {
  font-family:'Space Mono',monospace;
  font-size:clamp(6px,1vw,7.5px); letter-spacing:0.16em;
  color:rgba(191,160,106,0.55); text-transform:uppercase;
}
.attr-src {
  font-family:'Space Mono',monospace;
  font-size:clamp(6px,0.95vw,7.5px); letter-spacing:0.1em;
  color:rgba(255,255,255,0.22); text-align:right; line-height:2; max-width:42%;
}

/* ── BOTTOM BAR ── */
.bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  height:58px; display:flex; justify-content:space-between; align-items:center;
  padding:0 40px;
  background:rgba(7,7,7,0.92); backdrop-filter:blur(24px);
  border-top:1px solid rgba(255,255,255,0.04);
  transition:opacity 0.6s;
}
.bar.hide { opacity:0; pointer-events:none; }

/* step dots */
.steps { display:flex; align-items:center; gap:6px; }
.step {
  width:20px; height:1px; background:rgba(255,255,255,0.15);
  transition:all 0.4s ease; cursor:default;
}
.step.done { background:var(--gold2); }
.step.active { background:var(--gold); width:32px; }

/* nav */
.nav { display:flex; align-items:center; gap:10px; }

.btn {
  font-family:'Space Mono',monospace; font-size:8.5px;
  letter-spacing:0.22em; text-transform:uppercase;
  border:none; cursor:pointer; background:transparent;
  display:flex; align-items:center; gap:8px; transition:all 0.2s;
}
.btn-ghost {
  height:34px; padding:0 16px;
  border:1px solid var(--line); color:var(--muted);
}
.btn-ghost:hover { border-color:var(--gold2); color:var(--gold); }
.btn-ghost:disabled { opacity:0.2; cursor:not-allowed; pointer-events:none; }

.btn-next {
  height:34px; padding:0 22px;
  border:1px solid var(--gold2); color:var(--gold);
  position:relative; overflow:hidden;
}
.btn-next::before {
  content:''; position:absolute; inset:0;
  background:var(--gold); transform:translateX(-101%); transition:transform 0.26s ease;
}
.btn-next:hover::before { transform:translateX(0); }
.btn-next .nl { position:relative; z-index:1; display:flex; align-items:center; gap:8px; transition:color 0.26s; }
.btn-next:hover .nl { color:#070707; }

.btn-dl {
  height:34px; padding:0 18px;
  border:1px solid var(--line); color:var(--muted);
}
.btn-dl:hover { border-color:var(--gold2); color:var(--gold); }
.btn-dl:disabled { opacity:0.2; cursor:not-allowed; pointer-events:none; }
.dl-left { font-family:'Space Mono',monospace; font-size:7.5px; color:var(--gold2); margin-left:4px; }

/* ── WARN MODAL ── */
.modal {
  display:none; position:fixed; inset:0; z-index:400;
  background:rgba(7,7,7,0.75); backdrop-filter:blur(28px);
  align-items:center; justify-content:center;
}
.modal.show { display:flex; }
.modal-box {
  width:min(460px,90vw);
  background:#0E0E0E; border:1px solid #252525;
  padding:48px 44px 40px;
  display:flex; flex-direction:column; gap:22px;
  animation:boxIn 0.38s cubic-bezier(0.22,1,0.36,1);
}
@keyframes boxIn { from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)} }
.modal-icon { color:var(--gold); opacity:0.65; font-size:24px; }
.modal-title {
  font-family:'Playfair Display',serif; font-weight:700;
  font-size:clamp(22px,4vw,28px); color:var(--text); line-height:1.35;
}
.modal-body {
  font-family:'Noto Serif SC',serif; font-weight:300;
  font-size:13.5px; line-height:2.1; color:var(--muted);
  border-left:1px solid var(--gold2); padding-left:18px;
}
.modal-hint {
  font-family:'Space Mono',monospace; font-size:8.5px;
  letter-spacing:0.2em; color:var(--gold2); text-transform:uppercase; line-height:2;
}
.modal-btns { display:flex; gap:10px; margin-top:6px; }
.mbtn {
  font-family:'Space Mono',monospace; font-size:8.5px;
  letter-spacing:0.22em; text-transform:uppercase;
  border:none; cursor:pointer; height:38px; padding:0 22px; transition:all 0.2s;
}
.mbtn-cancel { background:transparent; color:var(--muted); border:1px solid var(--line); }
.mbtn-cancel:hover { border-color:var(--gold2); color:var(--gold); }
.mbtn-go { background:var(--gold); color:#070707; font-weight:700; }
.mbtn-go:hover { background:#d4b07a; }

/* ── END SCREEN ── */
.end {
  display:none; position:fixed; inset:0; z-index:300;
  flex-direction:column; align-items:center; justify-content:center;
  background:#070707;
}
.end.show { display:flex; }

.end-watermark {
  position:absolute; inset:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.end-watermark span {
  font-family:'Playfair Display',serif; font-weight:800;
  font-size:clamp(100px,22vw,200px); color:rgba(191,160,106,0.03);
  letter-spacing:0.1em; white-space:nowrap;
}

.end-content {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center; gap:30px;
  padding:40px 32px; max-width:500px; text-align:center;
  animation:riseIn 1.1s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes riseIn { from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)} }

.end-eyebrow {
  font-family:'Space Mono',monospace; font-size:8.5px;
  letter-spacing:0.38em; color:var(--gold); text-transform:uppercase;
  display:flex; align-items:center; gap:14px;
}
.end-eyebrow::before, .end-eyebrow::after {
  content:''; display:block; height:1px; width:28px; background:var(--gold); opacity:0.4;
}

.end-title {
  font-family:'Playfair Display',serif; font-weight:700;
  font-size:clamp(30px,6vw,48px); color:var(--text);
  line-height:1.25; letter-spacing:0.03em;
}

.end-poem {
  font-family:'Noto Serif SC',serif; font-weight:200;
  font-size:clamp(13px,2.2vw,15.5px); line-height:2.2;
  color:rgba(236,228,214,0.45); max-width:380px;
  padding:24px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line);
}

.end-rule { width:36px; height:1px; background:var(--gold2); opacity:0.45; }

.end-cd {
  font-family:'Space Mono',monospace;
  font-size:clamp(11px,2vw,13px); letter-spacing:0.18em; color:var(--gold);
  display:flex; align-items:center; gap:10px;
}
.end-cd-dot { width:5px; height:5px; border-radius:50%; background:var(--gold); opacity:0.55; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.55;transform:scale(1)} 50%{opacity:1;transform:scale(1.3)} }

.end-note {
  font-family:'Space Mono',monospace; font-size:8px;
  letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; line-height:2;
}

/* ── TOAST ── */
.toast {
  position:fixed; bottom:72px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--gold); color:#070707;
  font-family:'Space Mono',monospace; font-size:8.5px; letter-spacing:0.22em;
  padding:10px 22px; opacity:0;
  transition:all 0.3s ease; pointer-events:none; z-index:700; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<header class="hdr" id="hdr">
  <div class="hdr-brand">每日一句 · Daily Wisdom</div>
  <div class="hdr-date" id="hDate"></div>
</header>

<!-- Card scene -->
<div class="scene" id="scene">
  <div class="card" id="theCard">
    <div class="card-bg" id="cardBg"></div>
    <div class="card-vignette"></div>
    <div class="card-grain"></div>
    <div class="co co-tl"></div><div class="co co-tr"></div>
    <div class="co co-bl"></div><div class="co co-br"></div>
    <div class="ghost">"</div>
    <div class="cc" id="cc">
      <div class="top-row">
        <div class="tag" id="tagEl">Day · 001</div>
        <div class="top-date" id="topDate"></div>
      </div>
      <div class="body">
        <p class="q-cn" id="qCn"></p>
        <p class="q-en" id="qEn"></p>
      </div>
      <div>
        <div class="attr-bar"></div>
        <div class="attr">
          <div><div class="attr-name" id="aName"></div><div class="attr-sub" id="aSub"></div></div>
          <div class="attr-src" id="aSrc"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom bar -->
<div class="bar" id="bar">
  <!-- Step indicators -->
  <div class="steps" id="steps"></div>

  <!-- Actions -->
  <div class="nav">
    <button class="btn btn-dl" id="dlBtn" onclick="downloadCard()">
      <i class="fas fa-download"></i> 下载
      <span class="dl-left" id="dlLeft"></span>
    </button>
    <button class="btn btn-ghost" onclick="copyQ()">
      <i class="fas fa-copy"></i> 复制
    </button>
    <button class="btn btn-next" id="btnNext" onclick="tryAdvance()">
      <span class="nl">下一句 <i class="fas fa-arrow-right"></i></span>
    </button>
  </div>
</div>

<!-- Warning modal -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-icon"><i class="fas fa-hourglass-half"></i></div>
    <div class="modal-title">向前，便无法回头</div>
    <div class="modal-body">
      人生如翻书，读过的页无法倒回。<br>
      这已是今日最后一句。<br>
      继续前行，今天的阅读将就此落幕。
    </div>
    <div class="modal-hint">
      共 5 句 · 请先保存你喜爱的图片<br>
      确认后将无法返回
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">留在这里</button>
      <button class="mbtn mbtn-go" onclick="goToEnd()">继续前行</button>
    </div>
  </div>
</div>

<!-- End screen -->
<div class="end" id="end">
  <div class="end-watermark"><span>TOMORROW</span></div>
  <div class="end-content">
    <div class="end-eyebrow">今日已读完</div>
    <div class="end-title">时光只向前<br>无法回头</div>
    <div class="end-poem">
      生命中有些瞬间，你只能带着它继续往前走。<br>
      就像翻过的书页，就像落下的夕阳——<br>
      它不会消失，只是永远留在了你身后。
    </div>
    <div class="end-rule"></div>
    <div class="end-note">明日，新的五句在等待</div>
    <div class="end-cd">
      <div class="end-cd-dot"></div>
      <span id="cdText">计算中...</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════

   background images (architectural /

    img:"https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=1200&q=90&fit=crop&auto=format"
  },
  {
    cn:"自由不是无所羁绊，而是选择自己的枷锁。",
    en:"Freedom is not the absence of constraints, but choosing one's own chains.",
    author:"波伏瓦", authorEn:"Simone de Beauvoir", years:"1908–1986", country:"法国", src:"The Ethics of Ambiguity",
    // dark minimal window with light
    img:"https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=1200&q=90&fit=crop&auto=format"
  },
  {
    cn:"此在的本质在于它的存在。",
    en:"The essence of Dasein lies in its existence.",
    author:"海德格尔", authorEn:"Martin Heidegger", years:"1889–1976", country:"德国", src:"Being and Time",
    // empty dark forest path
    img:"https://images.unsplash.com/photo-1448375240586-882707db888b?w=1200&q=90&fit=crop&auto=format"
  }
];

/* ══════════════════════════════════════
   CONSTANTS
   ══════════════════════════════════════ */
const DAILY_COUNT = 5;
const MAX_DL      = 5;

/* ══════════════════════════════════════
   STORAGE
   ══════════════════════════════════════
   dq_first : ms timestamp, first visit
   dq_state : { date, pos, done, dlCount }
     pos  0..4  current position (0-based)
     done bool  end screen shown, locked
   ══════════════════════════════════════ */
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadState() {
  if (!localStorage.getItem('dq_first'))
    localStorage.setItem('dq_first', String(Date.now()));

  let s = null;
  try { s = JSON.parse(localStorage.getItem('dq_state') || 'null'); } catch(e) { s = null; }

  const today = todayKey();

  // Always reset on a new day — no exceptions
  if (!s || s.date !== today) {
    s = { date: today, pos: 0, done: false, dlCount: 0 };
    saveState(s);
  }

  // Safety: if somehow done leaked across days, force-reset
  if (s.done && s.date !== today) {
    s = { date: today, pos: 0, done: false, dlCount: 0 };
    saveState(s);
  }

  // Clamp pos to valid range
  s.pos = Math.max(0, Math.min(s.pos, DAILY_COUNT - 1));

  return s;
}
function saveState(s) { localStorage.setItem('dq_state', JSON.stringify(s)); }

function daysSinceFirst() {
  const t = parseInt(localStorage.getItem('dq_first') || String(Date.now()), 10);
  return Math.max(1, Math.floor((Date.now() - t) / 86400000) + 1);
}

/* Today's 5 quotes (deterministic by date) */
function todayQuotes() {
  const d   = new Date();
  const doy = Math.floor((d - new Date(d.getFullYear(),0,0)) / 864e5);
  const out = [];
  let i = doy % ALL.length;
  for (let n = 0; n < DAILY_COUNT; n++) { out.push(ALL[i]); i = (i+1)%ALL.length; }
  return out;
}

/* ══════════════════════════════════════
   RUNTIME
   ══════════════════════════════════════ */
let S    = loadState();
const TQ = todayQuotes();
let cache = {};   // url → base64

/* ── date fmt ── */
function fmtDate() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  const W = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return { full:`${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}`, week:W[d.getDay()] };
}

/* ── image cache ── */
function fetchB64(url) {
  if (cache[url]) return Promise.resolve(cache[url]);
  return fetch(url)
    .then(r=>r.blob())
    .then(b=>new Promise(res=>{
      const fr=new FileReader();
      fr.onloadend=()=>{cache[url]=fr.result;res(fr.result);};
      fr.readAsDataURL(b);
    }))
    .catch(()=>null);
}

function setBg(url) {
  const bg = document.getElementById('cardBg');
  bg.classList.remove('ready');
  bg.style.backgroundImage = `url('${url}')`;
  const img = new Image();
  img.src = url;
  img.onload = () => bg.classList.add('ready');
  fetchB64(url); // preload silently
}

/* ── step indicators ── */
function buildSteps() {
  const el = document.getElementById('steps');
  el.innerHTML = '';
  for (let i=0; i<DAILY_COUNT; i++) {
    const d = document.createElement('div');
    d.className = 'step' + (i < S.pos ? ' done' : i===S.pos ? ' active' : '');
    el.appendChild(d);
  }
}

function updateSteps() {
  const steps = document.querySelectorAll('.step');
  steps.forEach((s,i)=>{
    s.className = 'step' + (i < S.pos ? ' done' : i===S.pos ? ' active' : '');
  });
}

/* ── populate ── */
function populate(q) {
  const dt = fmtDate();
  document.getElementById('qCn').textContent   = q.cn;
  document.getElementById('qEn').textContent   = `"${q.en}"`;
  document.getElementById('aName').textContent  = q.author;
  document.getElementById('aSub').textContent   = `${q.authorEn} · ${q.years} · ${q.country}`;
  document.getElementById('aSrc').textContent   = `— ${q.src}`;
  document.getElementById('tagEl').textContent  = `Day · ${String(daysSinceFirst()).padStart(3,'0')}`;
  document.getElementById('topDate').innerHTML  = `${dt.full}<br>${dt.week}`;
  setBg(q.img);
  updateSteps();
  updateDlBadge();
}

function render(anim) {
  const q  = TQ[S.pos];
  const cc = document.getElementById('cc');
  if (anim) {
    cc.classList.add('out');
    setTimeout(()=>{ cc.classList.remove('out'); populate(q); cc.classList.add('in'); setTimeout(()=>cc.classList.remove('in'),480); }, 330);
  } else { populate(q); }
}

/* ── advance logic (FORWARD ONLY) ── */
function tryAdvance() {
  if (S.done) return;
  if (S.pos < DAILY_COUNT - 1) {
    S.pos++; saveState(S); render(true); updateSteps();
  } else {
    // Last quote — show warning
    document.getElementById('modal').classList.add('show');
  }
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function goToEnd() {
  closeModal();
  S.done = true; saveState(S);
  // Transition to end screen
  document.getElementById('hdr').classList.add('hide');
  document.getElementById('scene').classList.add('hide');
  document.getElementById('bar').classList.add('hide');
  setTimeout(()=>{ document.getElementById('end').classList.add('show'); startCountdown(); }, 500);
}

/* ── download badge ── */
function updateDlBadge() {
  const rem   = MAX_DL - (S.dlCount||0);
  const badge = document.getElementById('dlLeft');
  const btn   = document.getElementById('dlBtn');
  if (badge) badge.textContent = `${rem}/${MAX_DL}`;
  if (btn && !btn._downloading) btn.disabled = rem <= 0;
}

/* ── COPY ── */
function copyQ() {
  const q = TQ[S.pos];
  navigator.clipboard.writeText(`${q.cn}\n\n——${q.author}《${q.src}》`)
    .then(()=>showToast('已复制到剪贴板'));
}

/* ══════════════════════════════════════
   DOWNLOAD  — native Canvas render
   Single image per click, 1080×1080
   ══════════════════════════════════════ */
async function downloadCard() {
  if ((S.dlCount||0) >= MAX_DL) { showToast('今日下载已达上限'); return; }

  const btn = document.getElementById('dlBtn');
  btn._downloading = true;   // flag so updateDlBadge won't touch disabled
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中';

  try {
    const q  = TQ[S.pos];
    const dt = fmtDate();
    const SZ = 1080;
    const cv = document.createElement('canvas');
    cv.width = cv.height = SZ;
    const ctx = cv.getContext('2d');

    /* 1 · background */
    const b64 = await fetchB64(q.img);
    if (b64) {
      await new Promise(res=>{
        const im=new Image(); im.crossOrigin='anonymous';
        im.onload=()=>{
          const sc=Math.max(SZ/im.width,SZ/im.height);
          const w=im.width*sc, h=im.height*sc;
          ctx.drawImage(im,(SZ-w)/2,(SZ-h)/2,w,h); res();
        };
        im.onerror=res; im.src=b64;
      });
    } else { ctx.fillStyle='#111'; ctx.fillRect(0,0,SZ,SZ); }

    /* 2 · vignette */
    const rg1=ctx.createRadialGradient(SZ/2,SZ,0,SZ/2,SZ,SZ*0.72);
    rg1.addColorStop(0,'rgba(0,0,0,0.88)'); rg1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg1; ctx.fillRect(0,0,SZ,SZ);
    const rg2=ctx.createRadialGradient(SZ/2,0,0,SZ/2,0,SZ*0.65);
    rg2.addColorStop(0,'rgba(0,0,0,0.5)'); rg2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=rg2; ctx.fillRect(0,0,SZ,SZ);
    const lg=ctx.createLinearGradient(0,SZ*0.55,0,SZ);
    lg.addColorStop(0,'rgba(5,5,5,0)'); lg.addColorStop(1,'rgba(5,5,5,0.82)');
    ctx.fillStyle=lg; ctx.fillRect(0,0,SZ,SZ);

    /* 3 · corners */
    const CO=26, CM=32;
    ctx.strokeStyle='rgba(191,160,106,0.36)'; ctx.lineWidth=1.5;
    [[CO,CO,1,1],[SZ-CO,CO,-1,1],[CO,SZ-CO,1,-1],[SZ-CO,SZ-CO,-1,-1]].forEach(([x,y,dx,dy])=>{
      ctx.beginPath(); ctx.moveTo(x+dx*CM,y); ctx.lineTo(x,y); ctx.lineTo(x,y+dy*CM); ctx.stroke();
    });

    /* 4 · ghost " */
    ctx.save(); ctx.font='800 370px "Georgia",serif';
    ctx.fillStyle='rgba(191,160,106,0.038)';
    ctx.fillText('"',18,310); ctx.restore();

    /* 5 · top tag */
    ctx.fillStyle='rgba(191,160,106,0.5)'; ctx.fillRect(CO+2,CO+5,18,1.5);
    ctx.save(); ctx.font='400 21px "Courier New",monospace';
    ctx.fillStyle='#BFA06A'; ctx.fillText(`DAY · ${String(daysSinceFirst()).padStart(3,'0')}`,CO+28,CO+17); ctx.restore();

    /* 6 · date top-right */
    ctx.save(); ctx.font='400 19px "Courier New",monospace';
    ctx.fillStyle='rgba(255,255,255,0.26)'; ctx.textAlign='right';
    ctx.fillText(dt.full,SZ-CO,CO+14); ctx.fillText(dt.week.toUpperCase(),SZ-CO,CO+38);
    ctx.textAlign='left'; ctx.restore();

    /* 7 · Chinese quote */
    const cnSz = q.cn.length > 22 ? 37 : 44;
    ctx.save(); ctx.font=`300 ${cnSz}px "Noto Serif SC","STSong","SimSun",serif`;
    ctx.fillStyle='rgba(236,228,214,0.95)';
    const cnLines = wrapCtx(ctx,q.cn,SZ-120);
    const bodyTop = SZ * 0.36;
    cnLines.forEach((l,i)=>ctx.fillText(l,CO+2,bodyTop+i*cnSz*2.1));
    ctx.restore();

    /* 8 · English quote (Playfair-style bold italic) */
    const enBase = cnSz > 38 ? 23 : 27;
    ctx.save(); ctx.font=`italic 700 ${enBase}px "Georgia","Times New Roman",serif`;
    ctx.fillStyle='rgba(236,228,214,0.4)';
    const enY = bodyTop+cnLines.length*cnSz*2.1+22;
    wrapCtx(ctx,`"${q.en}"`,SZ-120).forEach((l,i)=>{
      ctx.save(); ctx.transform(1,-0.06,0,1,0,0); ctx.fillText(l,CO+2,enY+i*enBase*1.82); ctx.restore();
    });
    ctx.restore();

    /* 9 · divider */
    const dY=SZ-152;
    const gDiv=ctx.createLinearGradient(CO,0,SZ-CO,0);
    gDiv.addColorStop(0,'rgba(191,160,106,0.38)'); gDiv.addColorStop(0.55,'rgba(255,255,255,0.05)'); gDiv.addColorStop(1,'rgba(255,255,255,0)');
    ctx.strokeStyle=gDiv; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(CO,dY); ctx.lineTo(SZ-CO,dY); ctx.stroke();

    /* 10 · author */
    ctx.save(); ctx.font=`700 46px "Georgia","Times New Roman",serif`;
    ctx.fillStyle='rgba(236,228,214,0.94)'; ctx.fillText(q.author,CO+2,dY+56); ctx.restore();
    ctx.save(); ctx.font=`400 19px "Courier New",monospace`;
    ctx.fillStyle='rgba(191,160,106,0.54)';
    ctx.fillText(`${q.authorEn.toUpperCase()} · ${q.years} · ${q.country}`,CO+2,dY+86); ctx.restore();
    ctx.save(); ctx.font=`400 18px "Courier New",monospace`;
    ctx.fillStyle='rgba(255,255,255,0.24)'; ctx.textAlign='right';
    ctx.fillText(`— ${q.src}`,SZ-CO,dY+64); ctx.textAlign='left'; ctx.restore();

    /* download */
    const a=document.createElement('a');
    a.download=`daily-quote-${dt.full.replace(/\./g,'-')}.png`;
    a.href=cv.toDataURL('image/png',1.0); a.click();

    S.dlCount=(S.dlCount||0)+1; saveState(S);
    const remaining = MAX_DL - S.dlCount;
    showToast(`已保存到本地  今日剩余 ${remaining} 次`);

  } catch(e) { console.error(e); showToast('下载失败，请重试'); }
  finally {
    // Restore button HTML first, THEN update badge so #dlLeft exists
    btn._downloading = false;
    btn.innerHTML = '<i class="fas fa-download"></i> 下载 <span class="dl-left" id="dlLeft"></span>';
    btn.disabled = false;
    updateDlBadge();   // now #dlLeft is in DOM, safe to call
  }
}

/* ── text wrap helper ── */
function wrapCtx(ctx,text,maxW) {
  const chars=[...text]; const lines=[]; let line='';
  for (const ch of chars) {
    const t=line+ch;
    if (ctx.measureText(t).width>maxW&&line){lines.push(line);line=ch;}
    else line=t;
  }
  if(line)lines.push(line); return lines;
}

/* ── countdown (device local time, per-second) ── */
function startCountdown() {
  function tick() {
    const now=new Date();
    const mid=new Date(now); mid.setHours(24,0,0,0);
    const diff=mid-now;
    const h=Math.floor(diff/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);
    document.getElementById('cdText').textContent =
      `距明天还有 ${String(h).padStart(2,'0')} 小时 ${String(m).padStart(2,'0')} 分 ${String(s).padStart(2,'0')} 秒`;
  }
  tick(); setInterval(tick,1000);
}

/* ── toast ── */
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

/* ══════════════════════════════════════
   BOOT
   ══════════════════════════════════════ */
(function init() {
  const dt = fmtDate();
  document.getElementById('hDate').textContent=`${dt.full} · ${dt.week}`;
  buildSteps();

  // Re-validate: only show end screen if done=true AND date is genuinely today
  if (S.done && S.date === todayKey()) {
    document.getElementById('hdr').classList.add('hide');
    document.getElementById('scene').classList.add('hide');
    document.getElementById('bar').classList.add('hide');
    document.getElementById('end').classList.add('show');
    startCountdown();
    return;
  }

  // If date mismatch slipped through, force fresh state
  if (S.date !== todayKey()) {
    S = { date: todayKey(), pos: 0, done: false, dlCount: 0 };
    saveState(S);
  }

  render(false);

  document.addEventListener('keydown', e=>{
    if (S.done) return;
    if (e.key==='ArrowRight'||e.key==='ArrowDown') tryAdvance();
    if (e.key==='Escape') closeModal();
  });
})();
</script>
