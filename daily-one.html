<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一句 · Daily Quote</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=Noto+Serif+SC:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --bg:     #080808;
  --gold:   #C9A96E;
  --gold2:  #7A5F38;
  --text:   #EDE5D8;
  --muted:  #6B6055;
  --border: #242424;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Serif SC',serif; overflow:hidden; }

/* ── HEADER ── */
.hdr {
  position:fixed; top:0; left:0; right:0; z-index:200;
  height:52px; display:flex; justify-content:space-between; align-items:center;
  padding:0 36px;
  background:rgba(8,8,8,0.88); backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.05);
  transition: opacity 0.5s;
}
.hdr.hidden { opacity:0; pointer-events:none; }
.hdr-brand { font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.38em; color:var(--muted); text-transform:uppercase; }
.hdr-date  { font-family:'Space Mono',monospace; font-size:9.5px; letter-spacing:0.18em; color:var(--gold); }

/* ── CARD WRAPPER ── */
.card-wrap {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  padding:68px 24px 100px;
  transition: opacity 0.5s;
}
.card-wrap.hidden { opacity:0; pointer-events:none; }

/* ── 1:1 CARD ── */
.card {
  position:relative;
  width: min(calc(100vh - 168px), calc(100vw - 48px), 620px);
  aspect-ratio:1/1; overflow:hidden;
}
.card-bg {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  transform:scale(1.05);
  transition:transform 9s ease, opacity 0.9s ease;
}
.card-bg.loaded { transform:scale(1); }
.card-overlay {
  position:absolute; inset:0;
  background:
    linear-gradient(to top, rgba(4,4,4,0.93) 0%, rgba(4,4,4,0.52) 45%, rgba(4,4,4,0.22) 100%),
    linear-gradient(to right, rgba(4,4,4,0.28) 0%, transparent 65%);
}
.card-grain {
  position:absolute; inset:0; mix-blend-mode:overlay; opacity:0.45;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
}

/* corners */
.cn { position:absolute; width:22px; height:22px; border-color:rgba(201,169,110,0.42); border-style:solid; border-width:0; }
.cn-tl{top:14px;left:14px;border-top-width:1px;border-left-width:1px}
.cn-tr{top:14px;right:14px;border-top-width:1px;border-right-width:1px}
.cn-bl{bottom:14px;left:14px;border-bottom-width:1px;border-left-width:1px}
.cn-br{bottom:14px;right:14px;border-bottom-width:1px;border-right-width:1px}

.ghost-q {
  position:absolute; top:-5%; left:3%;
  font-family:'Cormorant Garamond',serif; font-weight:300;
  font-size:clamp(150px,33vw,270px); line-height:1;
  color:var(--gold); opacity:0.05;
  user-select:none; pointer-events:none;
}

/* content */
.card-content {
  position:absolute; inset:0; z-index:2;
  display:flex; flex-direction:column; justify-content:space-between;
  padding:clamp(22px,5%,42px);
}
.top-row { display:flex; justify-content:space-between; align-items:flex-start; }
.issue-tag {
  font-family:'Space Mono',monospace;
  font-size:clamp(7px,1.4vw,9px); letter-spacing:0.3em; color:var(--gold);
  text-transform:uppercase; display:flex; align-items:center; gap:8px;
}
.issue-tag::before { content:''; display:block; width:18px; height:1px; background:var(--gold); opacity:0.55; }
.top-date {
  font-family:'Space Mono',monospace;
  font-size:clamp(6.5px,1.3vw,8.5px); letter-spacing:0.13em;
  color:rgba(255,255,255,0.3); text-align:right; line-height:1.95;
}

.card-body { display:flex; flex-direction:column; gap:clamp(9px,2%,16px); }
.q-cn {
  font-family:'Noto Serif SC',serif; font-weight:300;
  font-size:clamp(14px,3vw,21px); line-height:2.05;
  color:var(--text); text-shadow:0 1px 14px rgba(0,0,0,0.85);
}
.q-en {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300;
  font-size:clamp(11px,2vw,15px); line-height:1.72;
  color:rgba(237,229,216,0.48); text-shadow:0 1px 10px rgba(0,0,0,0.9);
}

.attr-divider { height:1px; background:linear-gradient(to right, rgba(201,169,110,0.38), rgba(255,255,255,0.05), transparent); margin-bottom:14px; }
.attr { display:flex; justify-content:space-between; align-items:flex-end; }
.attr-name { font-family:'Cormorant Garamond',serif; font-size:clamp(15px,3.2vw,21px); font-weight:600; color:var(--text); text-shadow:0 1px 12px rgba(0,0,0,0.9); margin-bottom:3px; }
.attr-sub  { font-family:'Space Mono',monospace; font-size:clamp(6px,1.1vw,7.5px); letter-spacing:0.17em; color:rgba(201,169,110,0.58); text-transform:uppercase; }
.attr-src  { font-family:'Space Mono',monospace; font-size:clamp(6px,1vw,7.5px); letter-spacing:0.1em; color:rgba(255,255,255,0.26); text-align:right; line-height:1.9; max-width:40%; }

/* content transitions */
.card-content.out { animation:cOut 0.36s ease forwards; }
.card-content.in  { animation:cIn  0.48s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes cOut { to { opacity:0; transform:translateY(-12px); } }
@keyframes cIn  { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* ── BOTTOM BAR ── */
.bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  height:60px; display:flex; justify-content:space-between; align-items:center;
  padding:0 36px;
  background:rgba(8,8,8,0.9); backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.05);
  transition:opacity 0.5s;
}
.bar.hidden { opacity:0; pointer-events:none; }

.nav-group { display:flex; align-items:center; gap:6px; }
.dots { display:flex; gap:5px; align-items:center; padding:0 6px; }
.dot {
  width:4px; height:4px; border-radius:50%;
  background:rgba(255,255,255,0.14); border:none; cursor:pointer;
  transition:all 0.3s;
}
.dot.active { background:var(--gold); transform:scale(1.7); }

.btn {
  font-family:'Space Mono',monospace; font-size:8.5px;
  letter-spacing:0.2em; text-transform:uppercase;
  border:none; cursor:pointer; background:transparent;
  display:flex; align-items:center; gap:7px; transition:all 0.2s;
}
.btn-sq {
  width:34px; height:34px; border:1px solid var(--border);
  color:var(--muted); justify-content:center; font-size:10px;
}
.btn-sq:hover { border-color:var(--gold2); color:var(--gold); }
.btn-sq:disabled { opacity:0.22; cursor:not-allowed; pointer-events:none; }

.actions { display:flex; align-items:center; gap:8px; }

.btn-copy { height:34px; padding:0 16px; border:1px solid var(--border); color:var(--muted); }
.btn-copy:hover { border-color:var(--gold2); color:var(--gold); }

.btn-dl {
  height:34px; padding:0 20px;
  border:1px solid var(--gold2); color:var(--gold);
  position:relative; overflow:hidden;
}
.btn-dl::before {
  content:''; position:absolute; inset:0;
  background:var(--gold); transform:translateX(-101%);
  transition:transform 0.27s ease;
}
.btn-dl:hover::before { transform:translateX(0); }
.btn-dl .lbl { position:relative; z-index:1; display:flex; align-items:center; gap:7px; transition:color 0.27s; }
.btn-dl:hover .lbl { color:#080808; }
.btn-dl:disabled { opacity:0.28; cursor:not-allowed; pointer-events:none; }
.dl-badge { font-size:7.5px; letter-spacing:0.08em; color:var(--gold2); margin-left:2px; }

/* ── PROGRESS ── */
.prog { position:fixed; bottom:60px; left:0; right:0; z-index:201; height:1px; overflow:hidden; }
.prog-fill { height:100%; width:0%; background:linear-gradient(to right, var(--gold2), var(--gold)); animation:progA 12s linear forwards; }
@keyframes progA { from{width:0%} to{width:100%} }

/* ── WARN MODAL ── */
.warn-modal {
  display:none; position:fixed; inset:0; z-index:400;
  background:rgba(8,8,8,0.78); backdrop-filter:blur(24px);
  align-items:center; justify-content:center;
}
.warn-modal.show { display:flex; }
.warn-box {
  width:min(480px, 90vw);
  background:#111; border:1px solid #2a2a2a;
  padding:48px 44px 40px;
  display:flex; flex-direction:column; gap:20px;
  animation:boxIn 0.4s cubic-bezier(0.22,1,0.36,1);
}
@keyframes boxIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.warn-icon { font-size:28px; color:var(--gold); opacity:0.7; }
.warn-title {
  font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:600;
  color:var(--text); line-height:1.4;
}
.warn-body {
  font-family:'Noto Serif SC',serif; font-weight:300;
  font-size:14px; line-height:2; color:var(--muted);
  border-left:1px solid var(--gold2); padding-left:18px;
}
.warn-sub {
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:0.18em; color:var(--gold2); text-transform:uppercase; line-height:1.8;
}
.warn-btns { display:flex; gap:12px; margin-top:8px; }
.warn-btn {
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.22em; text-transform:uppercase;
  border:none; cursor:pointer; height:38px; padding:0 22px; transition:all 0.22s;
}
.warn-btn-cancel { background:transparent; color:var(--muted); border:1px solid var(--border); }
.warn-btn-cancel:hover { border-color:var(--gold2); color:var(--gold); }
.warn-btn-confirm { background:var(--gold); color:#080808; }
.warn-btn-confirm:hover { background:#e0bc82; }

/* ── END SCREEN ── */
.end-screen {
  display:none; position:fixed; inset:0; z-index:300;
  flex-direction:column; align-items:center; justify-content:center;
  background:radial-gradient(ellipse at 50% 60%, #0e0c08 0%, #080808 70%);
  gap:0;
}
.end-screen.show { display:flex; }

.end-bg-text {
  position:absolute; inset:0; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none; user-select:none;
}
.end-bg-text span {
  font-family:'Cormorant Garamond',serif; font-size:clamp(120px,25vw,220px);
  font-weight:300; color:rgba(201,169,110,0.04); letter-spacing:-0.04em;
  white-space:nowrap;
}

.end-inner {
  position:relative; z-index:2;
  display:flex; flex-direction:column; align-items:center;
  gap:28px; padding:40px 32px; max-width:520px;
  animation:riseIn 1s cubic-bezier(0.22,1,0.36,1) 0.1s both;
}
@keyframes riseIn { from{opacity:0;transform:translateY(22px)} to{opacity:1;transform:translateY(0)} }

.end-line-top {
  display:flex; align-items:center; gap:16px;
  font-family:'Space Mono',monospace; font-size:9px;
  letter-spacing:0.3em; color:var(--gold); text-transform:uppercase;
}
.end-line-top::before, .end-line-top::after {
  content:''; display:block; height:1px; width:36px; background:var(--gold); opacity:0.45;
}

.end-title {
  font-family:'Cormorant Garamond',serif; font-size:clamp(32px,6vw,52px);
  font-weight:300; color:var(--text); letter-spacing:0.06em; text-align:center;
  line-height:1.3;
}

.end-quote {
  font-family:'Noto Serif SC',serif; font-weight:200;
  font-size:clamp(13px,2.2vw,16px); line-height:2.1;
  color:var(--muted); text-align:center; max-width:400px;
  border-top:1px solid var(--border); border-bottom:1px solid var(--border);
  padding:24px 0;
}

.end-sub {
  font-family:'Space Mono',monospace; font-size:clamp(8px,1.3vw,9.5px);
  letter-spacing:0.2em; color:rgba(201,169,110,0.5); text-align:center;
  text-transform:uppercase; line-height:2;
}

.end-countdown {
  font-family:'Space Mono',monospace; font-size:clamp(11px,2vw,14px);
  letter-spacing:0.15em; color:var(--gold);
  display:flex; align-items:center; gap:8px;
}
.end-countdown i { font-size:10px; opacity:0.6; }

.end-divider { width:40px; height:1px; background:var(--gold2); opacity:0.4; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:80px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--gold); color:#080808;
  font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.22em;
  padding:10px 22px; opacity:0;
  transition:all 0.32s ease; pointer-events:none; z-index:600; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Header -->
<header class="hdr" id="hdr">
  <div class="hdr-brand">每日一句 · Daily Wisdom</div>
  <div class="hdr-date" id="hDate"></div>
</header>

<!-- Card -->
<div class="card-wrap" id="cardWrap">
  <div class="card" id="theCard">
    <div class="card-bg" id="cardBg"></div>
    <div class="card-overlay"></div>
    <div class="card-grain"></div>
    <div class="cn cn-tl"></div><div class="cn cn-tr"></div>
    <div class="cn cn-bl"></div><div class="cn cn-br"></div>
    <div class="ghost-q">"</div>
    <div class="card-content" id="cardContent">
      <div class="top-row">
        <div class="issue-tag" id="issueTag">Day · 001</div>
        <div class="top-date" id="topDate"></div>
      </div>
      <div class="card-body">
        <p class="q-cn" id="qCn"></p>
        <p class="q-en" id="qEn"></p>
      </div>
      <div>
        <div class="attr-divider"></div>
        <div class="attr">
          <div>
            <div class="attr-name" id="aName"></div>
            <div class="attr-sub"  id="aSub"></div>
          </div>
          <div class="attr-src" id="aSrc"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Progress -->
<div class="prog"><div class="prog-fill" id="pFill"></div></div>

<!-- Bottom bar -->
<div class="bar" id="bar">
  <div class="nav-group">
    <button class="btn btn-sq" id="btnPrev" onclick="go(-1)"><i class="fas fa-arrow-left"></i></button>
    <div class="dots" id="dots"></div>
    <button class="btn btn-sq" id="btnNext" onclick="tryNext()"><i class="fas fa-arrow-right"></i></button>
  </div>
  <div class="actions">
    <button class="btn btn-copy" onclick="copyQ()"><i class="fas fa-copy"></i> 复制</button>
    <button class="btn btn-dl" id="dlBtn" onclick="downloadCard()">
      <span class="lbl"><i class="fas fa-download"></i> 下载图片 <span class="dl-badge" id="dlBadge"></span></span>
    </button>
  </div>
</div>

<!-- Warning modal: forward is one-way -->
<div class="warn-modal" id="warnModal">
  <div class="warn-box">
    <div class="warn-icon"><i class="fas fa-hourglass-half"></i></div>
    <div class="warn-title">向前，便无法回头</div>
    <div class="warn-body">
      人生如阅读，翻过的页无法倒回。<br>
      这是今日第 <span id="warnPos"></span> 句，也是最后一句。<br>
      继续前行，今天的旅程将就此落幕。
    </div>
    <div class="warn-sub">
      共 5 句 · 请保存你喜爱的一张图<br>
      到达终点后，无法返回
    </div>
    <div class="warn-btns">
      <button class="warn-btn warn-btn-cancel" onclick="closeWarn()">留在这里</button>
      <button class="warn-btn warn-btn-confirm" onclick="confirmNext()">继续前行</button>
    </div>
  </div>
</div>

<!-- End screen -->
<div class="end-screen" id="endScreen">
  <div class="end-bg-text"><span>FINIS</span></div>
  <div class="end-inner">
    <div class="end-line-top">今日已读完</div>
    <div class="end-title">时光只向前<br>无法回头</div>
    <div class="end-quote">
      生命中有些时刻，你只能带着它继续往前走。<br>
      就像翻过的书页，就像落下的夕阳——<br>
      它不会消失，只是留在了你身后。
    </div>
    <div class="end-divider"></div>
    <div class="end-sub">明日，新的五句在等待你</div>
    <div class="end-countdown" id="endCountdown">
      <i class="fas fa-circle" style="font-size:6px"></i>
      <span id="cdText">计算中...</span>
    </div>
    <div class="end-sub" style="font-size:8px;opacity:0.5">每天5次下载机会已重置于次日零时</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════════════
   QUOTES DATA (12 total, 5 shown per day)
   ══════════════════════════════════════════ */
const ALL_QUOTES = [
  { cn:"在隆冬，我终于知道，我身上有一个不可战胜的夏天。", en:"In the midst of winter, I found there was, within me, an invincible summer.", author:"阿尔贝·加缪", authorEn:"Albert Camus", years:"1913–1960", country:"法国", src:"Return to Tipasa", img:"https://images.unsplash.com/photo-1516912481808-3406841bd33c?w=1080&q=80&fit=crop" },
  { cn:"我们必须想象西西弗斯是幸福的。", en:"One must imagine Sisyphus happy.", author:"阿尔贝·加缪", authorEn:"Albert Camus", years:"1913–1960", country:"法国", src:"The Myth of Sisyphus", img:"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1080&q=80&fit=crop" },
  { cn:"反抗本身，就已经是一种忠诚。", en:"Rebellion itself is already a form of fidelity.", author:"阿尔贝·加缪", authorEn:"Albert Camus", years:"1913–1960", country:"法国", src:"The Rebel", img:"https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1080&q=80&fit=crop" },
  { cn:"存在先于本质。", en:"Existence precedes essence.", author:"萨特", authorEn:"Jean-Paul Sartre", years:"1905–1980", country:"法国", src:"Existentialism is a Humanism", img:"https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1080&q=80&fit=crop" },
  { cn:"他人即地狱。", en:"Hell is other people.", author:"萨特", authorEn:"Jean-Paul Sartre", years:"1905–1980", country:"法国", src:"No Exit", img:"https://images.unsplash.com/photo-1553356084-58ef4a67b2a7?w=1080&q=80&fit=crop" },
  { cn:"上帝死了。我们杀了他——你和我。", en:"God is dead. And we have killed him — you and I.", author:"尼采", authorEn:"Friedrich Nietzsche", years:"1844–1900", country:"德国", src:"The Gay Science", img:"https://images.unsplash.com/photo-1504893524553-b855bce32c67?w=1080&q=80&fit=crop" },
  { cn:"那杀不死我的，使我更强大。", en:"That which does not kill me makes me stronger.", author:"尼采", authorEn:"Friedrich Nietzsche", years:"1844–1900", country:"德国", src:"Twilight of the Idols", img:"https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=1080&q=80&fit=crop" },
  { cn:"书必须是解冻我们内心冰封之海的一把斧子。", en:"A book must be the axe for the frozen sea within us.", author:"卡夫卡", authorEn:"Franz Kafka", years:"1883–1924", country:"奥地利", src:"Letters to Friends", img:"https://images.unsplash.com/photo-1418985991508-e47386d96a71?w=1080&q=80&fit=crop" },
  { cn:"人类无法忍受太多的现实。", en:"Humankind cannot bear very much reality.", author:"T.S. 艾略特", authorEn:"T.S. Eliot", years:"1888–1965", country:"英国", src:"Four Quartets", img:"https://images.unsplash.com/photo-1448375240586-882707db888b?w=1080&q=80&fit=crop" },
  { cn:"当我们不再能改变情况时，我们就面临改变自己的挑战。", en:"When we are no longer able to change a situation, we are challenged to change ourselves.", author:"弗兰克尔", authorEn:"Viktor Frankl", years:"1905–1997", country:"奥地利", src:"Man's Search for Meaning", img:"https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=1080&q=80&fit=crop" },
  { cn:"自由不是无所羁绊，而是选择自己的枷锁。", en:"Freedom is not the absence of constraints, but choosing one's own chains.", author:"波伏瓦", authorEn:"Simone de Beauvoir", years:"1908–1986", country:"法国", src:"The Ethics of Ambiguity", img:"https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=1080&q=80&fit=crop" },
  { cn:"此在的本质在于它的存在。", en:"The essence of Dasein lies in its existence.", author:"海德格尔", authorEn:"Martin Heidegger", years:"1889–1976", country:"德国", src:"Being and Time", img:"https://images.unsplash.com/photo-1519659528534-7fd733a832a0?w=1080&q=80&fit=crop" }
];

/* ══════════════════════════════════════════
   STATE  (localStorage)
   ══════════════════════════════════════════
   dq_first  : timestamp of first visit
   dq_state  : { date, pos, finished, dlCount }
     date     : "YYYY-M-D"
     pos      : 0..4  (index within today's 5-quote list)
     finished : bool  (showed end screen, locked out)
     dlCount  : number of downloads today
   ══════════════════════════════════════════ */
const DAYS_QUOTES = 5;
const MAX_DL      = 5;

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
}

function loadState() {
  // First visit timestamp
  if (!localStorage.getItem('dq_first')) {
    localStorage.setItem('dq_first', String(Date.now()));
  }
  let s = JSON.parse(localStorage.getItem('dq_state') || 'null');
  if (!s || s.date !== todayStr()) {
    // New day — reset
    s = { date: todayStr(), pos: 0, finished: false, dlCount: 0 };
    saveState(s);
  }
  return s;
}

function saveState(s) {
  localStorage.setItem('dq_state', JSON.stringify(s));
}

function usageDays() {
  const first = parseInt(localStorage.getItem('dq_first') || String(Date.now()), 10);
  return Math.max(1, Math.floor((Date.now() - first) / 86400000) + 1);
}

/* Pick today's 5 quotes deterministically from date */
function todayQuotes() {
  const d   = new Date();
  const doy = Math.floor((d - new Date(d.getFullYear(),0,0)) / 864e5);
  const out = [];
  let   i   = doy % ALL_QUOTES.length;
  for (let n = 0; n < DAYS_QUOTES; n++) {
    out.push(ALL_QUOTES[i]);
    i = (i + 1) % ALL_QUOTES.length;
  }
  return out;
}

/* ══════════════════════════════════════════
   RUNTIME
   ══════════════════════════════════════════ */
let state      = loadState();
const TQ       = todayQuotes();   // today's 5 quotes
let imgCache   = {};
let autoTimer  = null;
let cdInterval = null;

/* ── date fmt ── */
function fmtDate() {
  const d = new Date(), p = n => String(n).padStart(2,'0');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return {
    full: `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}`,
    week: days[d.getDay()]
  };
}

/* ── image ── */
function loadB64(url) {
  if (imgCache[url]) return Promise.resolve(imgCache[url]);
  return fetch(url)
    .then(r => r.blob())
    .then(b => new Promise(r => { const fr = new FileReader(); fr.onloadend = ()=>{imgCache[url]=fr.result;r(fr.result);}; fr.readAsDataURL(b); }))
    .catch(() => null);
}

function setBg(url) {
  const bg = document.getElementById('cardBg');
  bg.classList.remove('loaded');
  bg.style.backgroundImage = `url('${url}')`;
  const img = new Image(); img.src = url;
  img.onload = () => bg.classList.add('loaded');
  loadB64(url); // preload base64 for download
}

/* ── populate card ── */
function populate(q) {
  const dt = fmtDate();
  document.getElementById('qCn').textContent   = q.cn;
  document.getElementById('qEn').textContent   = `"${q.en}"`;
  document.getElementById('aName').textContent = q.author;
  document.getElementById('aSub').textContent  = `${q.authorEn} · ${q.years} · ${q.country}`;
  document.getElementById('aSrc').textContent  = `— ${q.src}`;
  document.getElementById('issueTag').textContent = `Day · ${String(usageDays()).padStart(3,'0')}`;
  document.getElementById('topDate').innerHTML = `${dt.full}<br>${dt.week}`;
  setBg(q.img);
  updateDots();
  updateDlBadge();
}

function render(anim) {
  const q  = TQ[state.pos];
  const cc = document.getElementById('cardContent');
  if (anim) {
    cc.classList.add('out');
    setTimeout(() => { cc.classList.remove('out'); populate(q); cc.classList.add('in'); setTimeout(()=>cc.classList.remove('in'), 500); }, 370);
  } else {
    populate(q);
  }
}

/* ── dots ── */
function updateDots() {
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===state.pos));
  // Disable back btn on first quote
  document.getElementById('btnPrev').disabled = (state.pos === 0);
}

/* ── NAV ── */
function go(dir) {
  if (dir === -1) {
    if (state.pos === 0) return; // already first
    state.pos--;
    saveState(state);
    render(true);
    resetProg();
  }
}

function tryNext() {
  if (state.finished) return;
  if (state.pos < DAYS_QUOTES - 1) {
    // Normal advance
    state.pos++;
    saveState(state);
    render(true);
    resetProg();
  } else {
    // On the last quote — show warning before showing end screen
    document.getElementById('warnPos').textContent = DAYS_QUOTES;
    document.getElementById('warnModal').classList.add('show');
  }
}

function closeWarn() {
  document.getElementById('warnModal').classList.remove('show');
}

function confirmNext() {
  closeWarn();
  state.finished = true;
  saveState(state);
  showEndScreen();
}

/* ── PROGRESS ── */
function resetProg() {
  clearTimeout(autoTimer);
  const f = document.getElementById('pFill');
  f.style.animation = 'none'; f.offsetHeight;
  f.style.animation = 'progA 12s linear forwards';
  // Auto-advance: on last quote show warning instead
  autoTimer = setTimeout(() => {
    if (state.pos < DAYS_QUOTES - 1) {
      state.pos++; saveState(state); render(true); resetProg();
    } else {
      tryNext();
    }
  }, 12000);
}

/* ── END SCREEN ── */
function showEndScreen() {
  clearTimeout(autoTimer);
  document.getElementById('endScreen').classList.add('show');
  document.getElementById('hdr').classList.add('hidden');
  document.getElementById('cardWrap').classList.add('hidden');
  document.getElementById('bar').classList.add('hidden');
  document.querySelector('.prog').style.display = 'none';
  startCountdown();
}

/* ── COUNTDOWN (device local time) ── */
function startCountdown() {
  function tick() {
    const now      = new Date();
    const midnight = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    const diff = midnight - now;                  // ms
    const h    = Math.floor(diff / 3600000);
    const m    = Math.floor((diff % 3600000) / 60000);
    const s    = Math.floor((diff % 60000) / 1000);
    document.getElementById('cdText').textContent =
      `距明天还有 ${String(h).padStart(2,'0')} 小时 ${String(m).padStart(2,'0')} 分 ${String(s).padStart(2,'0')} 秒`;
  }
  tick();
  cdInterval = setInterval(tick, 1000);
}

/* ── COPY ── */
function copyQ() {
  const q = TQ[state.pos];
  navigator.clipboard.writeText(`${q.cn}\n\n——${q.author}《${q.src}》`)
    .then(()=>showToast('已复制到剪贴板'));
}

/* ── DOWNLOAD (native Canvas) ── */
function updateDlBadge() {
  const rem = MAX_DL - (state.dlCount || 0);
  document.getElementById('dlBadge').textContent = `${rem}/${MAX_DL}`;
  document.getElementById('dlBtn').disabled = rem <= 0;
}

async function downloadCard() {
  if ((state.dlCount||0) >= MAX_DL) { showToast('今日下载已达上限'); return; }

  const btn = document.getElementById('dlBtn');
  const lbl = btn.querySelector('.lbl');
  lbl.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 生成中...';
  btn.style.pointerEvents = 'none';

  try {
    const q   = TQ[state.pos];
    const dt  = fmtDate();
    const SZ  = 1080;
    const cv  = document.createElement('canvas');
    cv.width  = SZ; cv.height = SZ;
    const ctx = cv.getContext('2d');

    // 1. Background
    const b64 = await loadB64(q.img);
    if (b64) {
      await new Promise(res => {
        const im = new Image(); im.crossOrigin = 'anonymous';
        im.onload = () => { const sc=Math.max(SZ/im.width,SZ/im.height); const w=im.width*sc,h=im.height*sc; ctx.drawImage(im,(SZ-w)/2,(SZ-h)/2,w,h); res(); };
        im.onerror = res; im.src = b64;
      });
    } else { ctx.fillStyle='#141414'; ctx.fillRect(0,0,SZ,SZ); }

    // 2. Overlays
    const g1=ctx.createLinearGradient(0,SZ,0,0);
    g1.addColorStop(0,'rgba(4,4,4,0.94)'); g1.addColorStop(0.44,'rgba(4,4,4,0.54)'); g1.addColorStop(1,'rgba(4,4,4,0.22)');
    ctx.fillStyle=g1; ctx.fillRect(0,0,SZ,SZ);
    const g2=ctx.createLinearGradient(0,0,SZ,0);
    g2.addColorStop(0,'rgba(4,4,4,0.28)'); g2.addColorStop(0.65,'rgba(4,4,4,0)');
    ctx.fillStyle=g2; ctx.fillRect(0,0,SZ,SZ);

    // 3. Corners
    ctx.strokeStyle='rgba(201,169,110,0.42)'; ctx.lineWidth=1.5;
    const CM=30,CO=24;
    [[CO,CO,1,1],[SZ-CO,CO,-1,1],[CO,SZ-CO,1,-1],[SZ-CO,SZ-CO,-1,-1]].forEach(([x,y,dx,dy])=>{
      ctx.beginPath(); ctx.moveTo(x+dx*CM,y); ctx.lineTo(x,y); ctx.lineTo(x,y+dy*CM); ctx.stroke();
    });

    // 4. Ghost quote
    ctx.font='300 360px Georgia,serif'; ctx.fillStyle='rgba(201,169,110,0.042)';
    ctx.fillText('"', 20, 320);

    // 5. Issue tag
    ctx.fillStyle='rgba(201,169,110,0.55)'; ctx.fillRect(CO+2,CO+4,22,1.5);
    ctx.font='400 20px "Courier New",monospace'; ctx.fillStyle='#C9A96E'; ctx.letterSpacing='4px';
    ctx.fillText(`DAY · ${String(usageDays()).padStart(3,'0')}`, CO+32, CO+16);

    // 6. Date
    ctx.font='400 18px "Courier New",monospace'; ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.textAlign='right';
    ctx.fillText(dt.full, SZ-CO, CO+12); ctx.fillText(dt.week.toUpperCase(), SZ-CO, CO+36); ctx.textAlign='left';

    // 7. Chinese quote
    const cnSz = q.cn.length > 22 ? 36 : 42;
    ctx.font=`300 ${cnSz}px "Noto Serif SC","STSong","SimSun",serif`; ctx.fillStyle='rgba(237,229,216,0.95)';
    const cnLines = wrapCtx(ctx, q.cn, SZ-120);
    const bodyY   = SZ * 0.37;
    cnLines.forEach((l,i) => ctx.fillText(l, CO+2, bodyY + i*cnSz*2.05));

    // 8. English quote (slant)
    const enSz = cnSz > 38 ? 21 : 25;
    ctx.font=`300 ${enSz}px Georgia,serif`; ctx.fillStyle='rgba(237,229,216,0.42)';
    const enY = bodyY + cnLines.length*cnSz*2.05 + 24;
    wrapCtx(ctx,`"${q.en}"`,SZ-120).forEach((l,i)=>{ ctx.save(); ctx.transform(1,-0.1,0,1,0,0); ctx.fillText(l,CO+2,enY+i*enSz*1.85); ctx.restore(); });

    // 9. Divider
    const divY = SZ-148;
    const gDiv=ctx.createLinearGradient(CO,0,SZ-CO,0);
    gDiv.addColorStop(0,'rgba(201,169,110,0.4)'); gDiv.addColorStop(0.6,'rgba(255,255,255,0.06)'); gDiv.addColorStop(1,'rgba(255,255,255,0)');
    ctx.strokeStyle=gDiv; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(CO,divY); ctx.lineTo(SZ-CO,divY); ctx.stroke();

    // 10. Author
    ctx.font=`600 44px "Georgia",serif`; ctx.fillStyle='rgba(237,229,216,0.95)'; ctx.fillText(q.author, CO+2, divY+54);
    ctx.font=`400 18px "Courier New",monospace`; ctx.fillStyle='rgba(201,169,110,0.56)';
    ctx.fillText(`${q.authorEn.toUpperCase()} · ${q.years} · ${q.country}`, CO+2, divY+84);
    ctx.fillStyle='rgba(255,255,255,0.26)'; ctx.textAlign='right';
    ctx.font=`400 17px "Courier New",monospace`; ctx.fillText(`— ${q.src}`, SZ-CO, divY+62); ctx.textAlign='left';

    // Download
    const a = document.createElement('a');
    a.download = `daily-quote-${dt.full.replace(/\./g,'-')}.png`;
    a.href = cv.toDataURL('image/png',1.0); a.click();

    state.dlCount = (state.dlCount||0) + 1;
    saveState(state); updateDlBadge();
    showToast(`已保存  今日剩余 ${MAX_DL - state.dlCount} 次下载`);

  } catch(e) { console.error(e); showToast('下载失败，请重试'); }
  finally {
    lbl.innerHTML = '<i class="fas fa-download"></i> 下载图片 <span class="dl-badge" id="dlBadge"></span>';
    btn.style.pointerEvents = '';
    updateDlBadge();
  }
}

function wrapCtx(ctx, text, maxW) {
  const chars=[...text]; const lines=[]; let line='';
  for (const ch of chars) {
    const t=line+ch;
    if (ctx.measureText(t).width > maxW && line) { lines.push(line); line=ch; }
    else line=t;
  }
  if (line) lines.push(line);
  return lines;
}

/* ── TOAST ── */
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

/* ══════════════════════════════════════════
   INIT
   ══════════════════════════════════════════ */
function init() {
  const dt = fmtDate();
  document.getElementById('hDate').textContent = `${dt.full} · ${dt.week}`;

  // Build dots
  const dotsEl = document.getElementById('dots');
  TQ.forEach((_,i) => {
    const d = document.createElement('button');
    d.className = 'dot' + (i===state.pos ? ' active' : '');
    d.onclick = () => {
      if (state.finished) return;
      if (i > state.pos) {
        // Forward jump — warn if going to last
        if (i === DAYS_QUOTES - 1) { tryNext(); return; }
        state.pos = i; saveState(state); render(true); resetProg();
      } else if (i < state.pos) {
        state.pos = i; saveState(state); render(true); resetProg();
      }
    };
    dotsEl.appendChild(d);
  });

  // If already finished today, go straight to end screen
  if (state.finished) {
    showEndScreen();
    return;
  }

  render(false);
  updateDots();
  resetProg();
}

// Keyboard
document.addEventListener('keydown', e => {
  if (state.finished) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') tryNext();
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   go(-1);
  if (e.key==='Escape') closeWarn();
});

init();
</script>
